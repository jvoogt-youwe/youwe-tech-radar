<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tech Radar</title>
    <link href="/images/favicon.ico" rel="icon" />
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  </head>

  <body>
    <div class="hero-banner">
      <div class="hero-banner__wrapper">
        <div class="hero-banner__content">
          <!-- <p class="hero-banner__volume">Volume 1 | June 2026</p> -->
          <h1 class="hero-banner__title-text">Youwe Tech Radar</h1>
          <!-- <p class="hero-banner__subtitle-text">An opinionated guide to today's technology landscape</p> -->
        </div>
        <div class="hero-banner__search"></div>
      </div>
    </div>
    <div id="youwe-loader" style="display: none">
      <div class="youwe-loader__spinner"></div>
      <p class="youwe-loader__text">Building your radar…</p>
    </div>
    <main>
      <div id="error-container" class="error-container home-page"></div>
      <div class="input-sheet-form home-page">
        <p>
          Enter the URL of your
          <a href="https://www.thoughtworks.com/radar/byor" target="_blank">Google Sheet, CSV or JSON</a> file below…
        </p>
        <form id="byor-form-submit" method="get">
          <input
            type="text"
            name="documentId"
            id="document-input"
            placeholder="e.g. https://docs.google.com/spreadsheets/d/<sheetid> or hosted CSV/JSON file"
            required=""
          />
          <input type="submit" value="Build my radar" />
          <a href="https://www.thoughtworks.com/radar/byor#guide">Need help?</a>
        </form>
      </div>
      <div class="graph-header"></div>
      <div id="radar">
        <p class="no-blip-text">
          There are no blips on this quadrant, please check your Google sheet/CSV/JSON file once.
        </p>
      </div>
      <div class="all-quadrants-mobile show-all-quadrants-mobile"></div>
      <div class="graph-footer"></div>
    </main>
    <footer class="youwe-footer">
      <div>
        <p>
          Created by
          <a href="https://www.youweagency.com" target="_blank" rel="noopener noreferrer">Youwe Agency</a> 2026
        </p>
        <a href="https://www.youweagency.com" target="_blank"><img src="/images/youwe-logo.png" alt="Youwe logo" /></a>
      </div>
    </footer>
  </body>
</html>
